<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- fundo azul com cantos arredondados -->
  <rect width="64" height="64" rx="12" fill="#3B5A82"/>

  <!-- ornamento decorativo de azulejo: cruz de pontas -->
  <g fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1">
    <line x1="32" y1="6" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="58" y2="32"/>
    <line x1="14" y1="14" x2="50" y2="50"/>
    <line x1="50" y1="14" x2="14" y2="50"/>
  </g>

  <!-- círculo externo decorativo -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- círculo interno -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- "C" central em branco -->
  <text
    x="32" y="43"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="30"
    font-style="italic"
    font-weight="400"
    fill="white"
    letter-spacing="-1"
  >C</text>
</svg>
